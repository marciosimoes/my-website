<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Links - Marcio Simões</title>
<style>
  @import url(https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.css);
  body {
    background-color: rgba(0, 181, 245, 0.05);
  }
  
  .social-container {
    width: 400px;
    margin: 40vh auto;
    text-align: center;
  }
  
  .social-icons {
    padding: 0;
    list-style: none;
    margin: 1em;
  }
  .social-icons li {
    display: inline-block;
    margin: 0.15em;
    position: relative;
    font-size: 1.2em;
  }
  .social-icons i {
    color: #fff;
    position: absolute;
    top: 21px;
    left: 21px;
    transition: all 265ms ease-out;
  }
  .social-icons a {
    display: inline-block;
  }
  .social-icons a:before {
    transform: scale(1);
    -ms-transform: scale(1);
    -webkit-transform: scale(1);
    content: " ";
    width: 60px;
    height: 60px;
    border-radius: 100%;
    display: block;
    background: linear-gradient(45deg, #0e6851, #19b08a);
    transition: all 265ms ease-out;
  }
  .social-icons a:hover:before {
    transform: scale(0);
    transition: all 265ms ease-in;
  }
  .social-icons a:hover i {
    transform: scale(2.2);
    -ms-transform: scale(2.2);
    -webkit-transform: scale(2.2);
    color: #00B5F5;
    background: -webkit-linear-gradient(45deg, #0e6851, #19b08a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: all 265ms ease-in;
  }
  </style>  
  <script>
    window.console = window.console || function(t) {};
  </script>
  <script>
    if (document.location.search.match(/type=embed/gi)) {
      window.parent.postMessage("resize", "*");
    }
  </script>
</head>
<body translate="no">
  <div class="social-container">
    <ul class="social-icons">
        <li><a href="https://instagram.com/marciosimoes_"><i class="fa fa-instagram"></i></a></li>
        <li><a href="https://www.linkedin.com/in/marciorsimoes/"><i class="fa fa-linkedin"></i></a></li>
        <li><a href="https://github.com/marciosimoes"><i class="fa fa-github"></i></a></li>
    </ul>
  </div>
</body>
</html>
